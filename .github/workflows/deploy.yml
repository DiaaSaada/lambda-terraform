name: Deploy Lambda

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      # TODO: Add S3 backend for proper Terraform state persistence
      # This import step is a workaround since state is lost between runs
      - name: Import existing resources
        working-directory: terraform
        run: |
          terraform import aws_iam_role.lambda_role products-api-role || true
          terraform import aws_lambda_function.api products-api || true
          terraform import aws_lambda_function_url.api_url products-api || true
          terraform import aws_apigatewayv2_api.api $(aws apigatewayv2 get-apis --query "Items[?Name=='products-api-api'].ApiId" --output text) || true

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Show Lambda URL
        working-directory: terraform
        run: terraform output lambda_function_url
